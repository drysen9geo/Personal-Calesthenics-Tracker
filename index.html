<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE BUILD — Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101314;
    --bg2:#0c0e0f;
    --surface:#1B1F21;
    --surface2:#20262a;
    --line:#2A3033;
    --line-soft:#20262a;
    --text:#EDEBE6;
    --muted:#8B9499;
    --muted2:#5f6a6e;
    --accent:#C98A3A;
    --accent-dim:#C98A3A33;
    --steel:#5B8A99;
    --steel-dim:#5B8A9933;
    --alert:#B8543F;
    --alert-dim:#B8543F2e;
    --good:#7FA66B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  body{padding-bottom:84px;}
  ::-webkit-scrollbar{display:none;}
  * {scrollbar-width:none;}

  .display{font-family:'Bebas Neue',sans-serif; letter-spacing:0.04em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header.top{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--bg) 80%, transparent);
    padding:14px 16px 6px;
  }
  .brand{display:flex; align-items:baseline; justify-content:space-between;}
  .brand h1{font-size:22px; margin:0; color:var(--text);}
  .brand .sub{color:var(--muted); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;}
  .brand .info-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    width:30px;height:30px;border-radius:50%;font-size:14px;font-family:'IBM Plex Mono',monospace;
    display:flex;align-items:center;justify-content:center;
  }

  .phase-strip{display:flex; gap:6px; overflow-x:auto; padding:12px 16px 8px; }
  .phase-chip{
    flex:0 0 auto; padding:7px 12px; border-radius:20px; border:1px solid var(--line);
    background:var(--surface); color:var(--muted); font-size:12px; font-weight:600;
    white-space:nowrap;
  }
  .phase-chip .n{color:var(--accent); font-family:'IBM Plex Mono',monospace; margin-right:5px;}
  .phase-chip.active{border-color:var(--accent); color:var(--text); background:var(--accent-dim);}

  .phase-banner{padding:2px 16px 12px;}
  .phase-banner .name{font-size:30px; line-height:1; color:var(--text);}
  .phase-banner .meta{color:var(--muted); font-size:12px; margin-top:4px;}
  .phase-banner .mission{color:var(--muted); font-size:12.5px; margin-top:8px; line-height:1.5;}

  /* Gate track */
  .gate-wrap{padding:6px 16px 14px; overflow-x:auto;}
  .gate-track{display:flex; align-items:center; position:relative; width:max-content; padding:10px 4px;}
  .gate-rail{position:absolute; left:14px; right:14px; top:50%; height:2px; background:var(--line); transform:translateY(-50%); z-index:0;}
  .gate-node{
    position:relative; z-index:1; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; margin-right:14px;
    background:var(--surface); border:2px solid var(--line); color:var(--muted);
    font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; flex:0 0 auto;
  }
  .gate-node.deload{border-color:var(--steel); color:var(--steel);}
  .gate-node.gate{
    border-radius:6px; width:40px; border-color:var(--alert); color:var(--alert); font-size:11px;
  }
  .gate-node.active{background:var(--accent); border-color:var(--accent); color:#141414; box-shadow:0 0 0 3px var(--accent-dim);}
  .gate-node.has-progress:after{
    content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--good);
  }

  .day-tabs{display:flex; gap:6px; padding:0 16px 14px; overflow-x:auto;}
  .day-tab{
    flex:0 0 auto; padding:9px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--surface); font-size:12.5px; font-weight:700; color:var(--muted);
  }
  .day-tab.active{border-color:var(--text); color:var(--text); background:var(--surface2);}
  .day-tab .opt{font-weight:400; color:var(--muted2); font-size:10px; display:block; margin-top:1px;}
  .day-tab.testtab{border-color:var(--alert); color:var(--alert);}
  .day-tab.testtab.active{background:var(--alert-dim); color:#f2ded9;}

  main{padding:0 16px;}

  .day-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .day-header h2{font-size:26px; margin:0; font-family:'Bebas Neue',sans-serif; letter-spacing:0.02em;}
  .day-header .where{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.1em;}
  .reset-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:11px;}

  .banner{
    border:1px solid var(--steel); background:var(--steel-dim); color:#cfe3e9;
    border-radius:10px; padding:10px 12px; font-size:12.5px; line-height:1.5; margin-bottom:14px;
  }
  .banner.alert{border-color:var(--alert); background:var(--alert-dim); color:#f2ded9;}
  .banner b{color:#fff;}

  .ex-card{
    background:var(--surface); border:1px solid var(--line-soft); border-radius:14px;
    padding:13px 14px; margin-bottom:10px; transition:opacity .15s;
  }
  .ex-card.done{opacity:0.42;}
  .ex-top{display:flex; align-items:flex-start; gap:10px;}
  .checkbox{
    flex:0 0 auto; width:24px; height:24px; border-radius:7px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; margin-top:1px; color:transparent; font-size:14px;
  }
  .ex-card.done .checkbox{background:var(--good); border-color:var(--good); color:#0e120f;}
  .ex-name{font-weight:700; font-size:15px; flex:1;}
  .ex-order{color:var(--muted2); font-size:10.5px; font-family:'IBM Plex Mono',monospace; margin-right:6px;}
  .ex-meta{display:flex; gap:14px; margin:8px 0 6px 34px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text);}
  .ex-meta .lbl{color:var(--muted2); font-size:9.5px; text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:1px; font-family:'Inter',sans-serif;}
  .ex-note{margin:6px 0 0 34px; color:var(--muted); font-size:12.5px; line-height:1.45;}
  .ex-track{
    margin:8px 0 0 34px; display:inline-flex; align-items:center; gap:6px;
    background:var(--accent-dim); border:1px solid var(--accent); color:#f0d3a8;
    border-radius:8px; padding:4px 9px; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;
  }
  .ex-track .k{color:var(--muted); font-weight:400; font-family:'Inter',sans-serif; text-transform:none;}

  .test-list{list-style:none; margin:0; padding:0;}
  .test-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--surface); border:1px solid var(--line-soft); border-radius:12px;
    padding:12px 14px; margin-bottom:9px;
  }
  .test-row .t{font-weight:600; font-size:14px;}
  .test-row .m{font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; text-align:right; flex:0 0 auto; max-width:44%;}
  .gate-rule{margin-top:16px; padding:14px; background:var(--alert-dim); border:1px solid var(--alert); border-radius:12px; font-size:12.5px; line-height:1.55; color:#f2ded9;}
  .gate-rule b{color:#fff;}

  .placement-box{background:var(--surface); border:1px solid var(--line-soft); border-radius:12px; padding:14px; font-size:12.5px; line-height:1.55; color:var(--muted); margin-bottom:14px;}

  footer.nav{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:var(--bg2); border-top:1px solid var(--line);
    display:flex; align-items:center; gap:8px; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  }
  footer.nav button{
    flex:1; background:var(--surface); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:12px 8px; font-size:13px; font-weight:700; font-family:'Inter',sans-serif;
  }
  footer.nav button.primary{background:var(--accent); border-color:var(--accent); color:#191410;}
  footer.nav .pos{flex:0 0 auto; color:var(--muted); font-size:10px; font-family:'IBM Plex Mono',monospace; text-align:center; min-width:56px;}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50;
    display:flex; align-items:flex-end;
  }
  .modal{
    background:var(--bg2); border-top:1px solid var(--line); border-radius:20px 20px 0 0;
    width:100%; max-height:82vh; overflow-y:auto; padding:20px 18px calc(28px + env(safe-area-inset-bottom));
  }
  .modal h3{font-family:'Bebas Neue',sans-serif; font-size:22px; margin:18px 0 8px; letter-spacing:0.02em;}
  .modal h3:first-child{margin-top:0;}
  .modal p, .modal li{font-size:13px; color:var(--muted); line-height:1.6;}
  .modal .close{
    position:sticky; top:0; float:right; background:var(--surface); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:6px 12px; font-size:12px; margin-bottom:8px;
  }
  .modal table{width:100%; border-collapse:collapse; font-size:12px; margin:8px 0 14px;}
  .modal td{border-bottom:1px solid var(--line-soft); padding:6px 4px; color:var(--muted); vertical-align:top;}
  .modal td.k{color:var(--text); font-weight:600; width:38%;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================= DATA ============================= */

function E(n,d,r,note,t){ return {n,d,r,note,t}; }

const WEEK0 = {
  id:0, label:"Week 0", name:"Baseline Test & Placement", months:"Before Wk 1", loc:"Planet Fitness",
  mission:"Run this two-day assessment before Phase 1. It sets your starting numbers, places you in the right phase, and becomes the benchmark every later gate test is measured against. Warm up fully, rest 3–5 minutes between tests, and write everything down.",
  dayOrder:["A","B"],
  days:{
    A:{label:"Day A — Upper Body", ex:[
      E("Strict pull-ups","Max reps","—","Dead hang to chin clearly over the bar, no swing. If under 3, use the assisted machine at the lightest weight you can manage and record reps + assist weight."),
      E("Push-ups","Max reps","—","Chest to within a fist of the floor, full lockout, rigid body line."),
      E("Dips","Max reps","—","Shoulder below elbow at the bottom. Use assistance if needed and record the assist."),
      E("Dead hang","Max time","—","Full grip on the bar or machine handles, shoulders active."),
    ]},
    B:{label:"Day B — Core, Handstand, Legs", ex:[
      E("Hollow body hold","Max time","—","Lower back pressed into the floor the entire time. Stop when it peels up."),
      E("Wall handstand","Max time","—","Chest facing the wall, walk up. Stop before form collapses."),
      E("Tuck L-sit on dip handles","Max time","—","Knees pulled up, arms locked, shoulders pushed down."),
      E("Plank + side plank","Max times","—","Straight line, hips level. Record each side separately for side plank."),
      E("Bodyweight squats","In 2 minutes","—","Full depth, count total reps."),
      E("Optional: 5k time","Log it","—","You already have this in the tank. Log it as a conditioning baseline."),
    ]}
  },
  placement:"Start in Phase 1 if any of these are true: fewer than 8 strict pull-ups, fewer than 25 push-ups, fewer than 10 unassisted dips, or a wall handstand under 45 seconds. Start in Phase 2 only if you already pass every mark on the Phase 1 exit test. Nobody starts beyond Phase 2 on day one — the year-one skills are built on volume your joints have to earn regardless of how strong you test."
};

const PHASES = [
{
  id:1, name:"Foundation", months:"1–3 · Wks 1–12", loc:"Planet Fitness",
  mission:"Rebuild tendons and work capacity. Perfect reps, climbing volume, and the first bricks of every year-two skill: the hollow body, the wall handstand, the support hold, and the side-chain work that becomes your flag.",
  tracked:{
    "Pull-ups":"W1 4x4, W2 4x5, W3 4x6, W4 2x4, W5 4x6, W6 4x7, W7 4x8, W8 2x5, W9 5x6, W10 5x7, W11 5x8, W12 test",
    "Push-ups":"W1 4x10, W2 4x12, W3 4x14, W4 2x10, W5 4x14, W6 4x16, W7 4x18, W8 2x12, W9 5x15, W10 5x17, W11 5x20, W12 test",
    "Dips":"W1 3x8, W2 3x9, W3 3x10, W4 2x6, W5 3x10, W6 3x11, W7 3x12, W8 2x8, W9 4x10, W10 4x11, W11 4x12, W12 test",
    "Wall handstand":"W1 5x15s, W2 5x18s, W3 5x22s, W4 3x15s, W5 5x25s, W6 5x28s, W7 5x32s, W8 3x20s, W9 5x35s, W10 5x40s, W11 5x45s, W12 test",
    "Hollow hold":"W1 4x15s, W2 4x20s, W3 4x25s, W4 2x15s, W5 4x25s, W6 4x30s, W7 4x35s, W8 2x20s, W9 4x35s, W10 4x40s, W11 4x45s, W12 test",
    "Tuck L-sit":"W1 4x8s, W2 4x10s, W3 4x12s, W4 2x8s, W5 4x12s, W6 4x13s, W7 4x14s, W8 2x10s, W9 4x14s, W10 4x15s, W11 4x16s, W12 test"
  },
  days:{
    Mon:{label:"Upper — Pull", ex:[
      E("Scapula pull-up","3 x 8","90s","Straight arms, shrug shoulders down and back. Lever foundation, done first as skill prep."),
      E("Pull-ups","4 x 4-8","2-3m","Dead hang to chin over, zero swing. Under 5 strict: use assisted machine and reduce assist weekly.","Pull-ups"),
      E("Lat pulldown","3 x 10-12","90s","Slight lean back, pull to upper chest, squeeze."),
      E("One-arm dumbbell row","3 x 10-12","90s","Heavy but strict. Big back builder from day one."),
      E("Cable face pull","3 x 15","60s","Rope high, pull to forehead, thumbs back. Shoulder insurance."),
      E("Hanging knee raise","3 x 8-12","60s","From the bar or machine handles. No swing, control down."),
      E("Dead hang","3 x 30-45s","90s","Active shoulders, at the end so grip is spent last. Grip limits everything later; build it now."),
    ]},
    Tue:{label:"Legs & Core A", ex:[
      E("Goblet squat","4 x 10-12","2m","Heaviest dumbbell you can handle for the reps, full depth."),
      E("Dumbbell Romanian deadlift","3 x 10","2m","Hinge, flat back, hamstring stretch."),
      E("Lying/seated leg curl","3 x 10-12","90s","Machine work; hamstrings protect knees for life."),
      E("Standing calf raise","3 x 15","60s","Pause at the top and bottom."),
      E("Plank","3 x 45-60s","60s","Squeeze glutes, ribs down."),
      E("Hollow body hold","4 x 15-30s","60s","Lower back glued to floor. The master position of calisthenics.","Hollow hold"),
    ]},
    Wed:{label:"Upper — Push", ex:[
      E("Wall handstand hold","5 x 15-30s","2m","First, fresh. Chest facing wall, walk up, hands 6-12in out, push tall through the shoulders.","Wall handstand"),
      E("Push-ups","4 x 8-15","2m","Rigid line, chest to a fist of the floor. Under 8 clean: hands on a bench.","Push-ups"),
      E("Dumbbell bench press","3 x 8-10","2m","Full range, controlled. Pec mass driver."),
      E("Dips","3 x 8-12","2m","Assisted machine standing on the frame if needed; drop assist weekly.","Dips"),
      E("Pike push-up","3 x 5-8","2m","Hips high, head to floor between hands. Handstand push-up seed."),
      E("Dumbbell lateral raise","3 x 12-15","60s","Light, strict, to shoulder height."),
      E("Support hold on dip handles","3 x 20-30s","90s","Arms locked, shoulders pressed down, slight hollow."),
    ]},
    Thu:{label:"Legs & Core B", ex:[
      E("Walking lunge","3 x 10/leg","90s","Dumbbells at sides, knee kisses floor."),
      E("Leg press","3 x 10-12","2m","Moderate load, full control."),
      E("Single-leg calf raise","3 x 12/leg","60s","Full range, slow."),
      E("Side plank","3 x 30-45s/side","45s","This is week one of your human flag. Treat it that way."),
      E("Tuck L-sit on dip handles","4 x 8-15s","90s","Knees up, arms straight. Progress by straightening one leg.","Tuck L-sit"),
    ]},
    Fri:{label:"Arms & Skill Holds", ex:[
      E("Wall handstand hold","3 x 20-30s","2m","Second exposure of the week, shorter. Quality only."),
      E("Easy pull-up volume","3 x 50-60% of max","90s","If your best set is 6, do 3x3. Grease the pattern without digging a hole before Monday."),
      E("Dumbbell curl","3 x 10-12","60s","Full stretch at the bottom."),
      E("Hammer curl","3 x 12","60s","Builds the brachialis for arm thickness."),
      E("Overhead DB triceps extension","3 x 10-12","60s","Deep stretch behind the head."),
      E("Cable triceps pushdown","2 x 12-15","60s","Squeeze the lockout."),
      E("Farmer carry","3 x 40 steps","90s","Heavy dumbbells, tall posture. Grip, traps, core."),
    ]},
    Sat:{label:"Core Blast & Pec Pump", optional:true, ex:[
      E("Machine/cable pec fly","3 x 12-15","60s","Big stretch, hard squeeze. Pump work, not maxing."),
      E("Push-up burnout","2 x max minus 2","90s","Stop two shy of failure both sets."),
      E("Hanging knee raise","3 x 10-12","60s","Strict."),
      E("Hollow body rocks","3 x 12","60s","Hold the shape, rock small."),
      E("Side plank","2 x 30-45s/side","45s","Extra flag deposit."),
      E("Optional finisher","20-30 min","—","Easy run or incline walk. Keeps the 5k engine and helps the eight-pack math."),
    ]}
  },
  exitLabel:"Phase 1 Exit Test — Week 12",
  exit:[["Strict pull-ups","8 reps"],["Push-ups","25 reps"],["Dips, unassisted","10 reps"],["Wall handstand","45 seconds"],["Hollow body hold","45 seconds"],["Tuck L-sit","15 seconds"],["Side plank","60 seconds per side"]],
  gateNote:"Pass every mark and move to Phase 2. Miss one or two narrowly? Repeat Block 3 (weeks 9-12) and retest in four weeks. Feeling unstoppable at week 8? Take the test early and bank the time."
},
{
  id:2, name:"Strength Engine", months:"4–6 · Wks 13–24", loc:"Planet Fitness (transition begins)",
  mission:"Convert the rebuilt base into real strength and lay every plank of the muscle-up: false grip, explosive pulling, straight bar dips, and the transition itself trained as low-bar negatives. Sort your bar access for Phase 3 during this window.",
  tracked:{
    "Pull-up load":"W1-3 5x5 +10lb or 2s pauses, W4 deload, W5-7 5x5-6 +15lb, W8 deload, W9-11 5x6 +15-20lb, W12 test",
    "Dips":"W1 5x6, W2 5x7, W3 5x8, W4 3x5, W5 5x8, W6 5x9, W7 5x10, W8 3x6, W9-11 5x6-8 with backpack load, W12 test",
    "Pike push-up":"W1 4x5 elevated, W2 4x6, W3 4x7, W4 2x5, W5 4x6 higher feet, W6 4x7, W7 4x8, W8 2x5, W9-11 4x6-8 highest elevation, W12 test",
    "MU negative":"W1 4x3 at 3s, W2-3 build to 4s, W4 skip, W5-7 4x3 at 4-5s, W8 skip, W9-11 4x3 at 5s smooth, W12 test",
    "False grip hang":"W1 4x10s, W3 4x14s, W4 2x10s, W5 4x14s, W7 4x18s, W8 2x12s, W9 4x18s, W11 4x20s, W12 test",
    "Wall HS + taps":"W1 5x30s, W3 5x40s, W4 3x30s, W5 5x45s +2taps, W7 5x50s +3taps, W8 3x30s, W9 5x55s +4taps, W11 5x60s +5taps, W12 test",
    "Tuck front lever":"W1 4x8s, W3 4x10s, W4 2x8s, W5 4x10s, W7 4x12s, W8 2x8s, W9 4x12s, W11 4x14s, W12 test"
  },
  days:{
    Mon:{label:"Upper — Pull (MU groundwork)", ex:[
      E("False grip dead hang","4 x 10-20s","2m","First, fresh. Wrists over the bar, hands cupped. Uncomfortable now, priceless in Phase 3.","False grip hang"),
      E("MU transition negative, low bar","4 x 3","2-3m","Smith bar at chest height: jump to support above bar, lower through transition in 3-5s.","MU negative"),
      E("Weighted/hardened pull-ups","5 x 5-6","2-3m","Backpack with a dumbbell inside, or 3s pause at the top if loading is awkward at PF.","Pull-up load"),
      E("Explosive pull-up","4 x 3-5","2-3m","Intent to pull the bar to your sternum. Speed is the point; stop when it slows."),
      E("Chest-supported DB row","4 x 8-10","90s","Incline bench, chest down, heavy. Mid-back thickness."),
      E("Straight-arm cable pulldown","3 x 12","60s","Locked elbows, sweep to hips. Direct lever and flag prep."),
      E("Hanging leg raise","3 x 8-12","60s","Straight legs to parallel or above. Progressed from knee raises."),
    ]},
    Tue:{label:"Legs & Core A", ex:[
      E("Smith squat / heavy goblet","3 x 8-10","2m","Controlled depth, drive up hard."),
      E("Single-leg RDL","3 x 8/leg","90s","Balance plus hamstrings."),
      E("Leg curl","3 x 10-12","90s","Slow negatives."),
      E("Standing calf raise","3 x 12-15","60s","Pause reps."),
      E("Hollow body rocks","3 x 12-15","60s","Hold the shape, rock small. Harder than it reads."),
      E("Hanging windshield wiper, tucked","3 x 6-10/side","90s","Knees up, rotate side to side under control. Flag obliques."),
    ]},
    Wed:{label:"Upper — Push", ex:[
      E("Wall handstand + shoulder taps","5 x 30-60s","2m","First, fresh. Add 2-4 alternating shoulder taps per set in Blocks 2-3.","Wall HS + taps"),
      E("Dips","5 x 6-10","2-3m","Full range. When 5x10 is clean, add a loaded backpack.","Dips"),
      E("Feet-elevated pike push-up","4 x 5-8","2-3m","Feet on a bench, hips stacked over hands. Halfway to a wall HSPU.","Pike push-up"),
      E("Archer push-up","3 x 6-10/side","2m","Shift weight to one arm, other arm straight. Unilateral pressing strength."),
      E("Dumbbell shoulder press","3 x 8-10","90s","Strict, full lockout."),
    ]},
    Thu:{label:"Legs & Core B", ex:[
      E("Bulgarian split squat","4 x 8/leg","2m","Rear foot on bench, dumbbells in hand. The best PF leg builder."),
      E("Leg curl, light","2 x 12-15","60s","Second weekly touch, well shy of failure."),
      E("Calf raise","3 x 12-15","60s","Single-leg if the standing machine is taken."),
      E("Side plank w/ top-leg raise","3 x 20-30s/side","60s","Raise and hold the top leg. Flag prep, level two."),
      E("L-sit progression","5 x 10-15s","90s","One leg extended, then both. On dip handles or the floor."),
    ]},

/* ============================= NAV FLATTENING ============================= */
function buildTimeline(){
  const t = [];
  t.push({kind:"week0", dayKey:"A"});
  t.push({kind:"week0", dayKey:"B"});
  PHASES.forEach(ph=>{
    for(let w=1; w<=12; w++){
      ["Mon","Tue","Wed","Thu","Fri","Sat"].forEach(dk=>{
        t.push({kind:"day", phaseId:ph.id, week:w, dayKey:dk});
      });
      if(w===8 || w===12){
        t.push({kind:"gate", phaseId:ph.id, week:w});
      }
    }
  });
  t.push({kind:"maint", dayKey:"Day1"});
  t.push({kind:"maint", dayKey:"Day2"});
  t.push({kind:"maint", dayKey:"Day3"});
  return t;
}
const TIMELINE = buildTimeline();

function expandWeeks(str){
  const weeks = new Array(13).fill(null);
  str.split(",").forEach(tok=>{
    tok = tok.trim();
    const m = tok.match(/^W(\d+)(?:-(\d+))?\s+(.*)$/i);
    if(!m) return;
    const start = parseInt(m[1],10), end = m[2]?parseInt(m[2],10):start;
    for(let w=start; w<=end; w++){ weeks[w] = m[3].trim(); }
  });
  for(let w=2; w<=12; w++){ if(!weeks[w]) weeks[w] = weeks[w-1]; }
  return weeks;
}
const PROG_CACHE = {};
function progFor(phaseId, key, week){
  const cacheKey = phaseId+"|"+key;
  if(!PROG_CACHE[cacheKey]){
    const ph = PHASES.find(p=>p.id===phaseId);
    PROG_CACHE[cacheKey] = expandWeeks(ph.tracked[key]);
  }
  return PROG_CACHE[cacheKey][week] || "—";
}

/* ============================= STATE / STORAGE ============================= */
/* Persists locally in this browser via localStorage — stays on this device,
   survives closing the tab/app, no account or internet needed after first load. */
const STORAGE_KEY = "build-progress-v1";
let state = { idx: 2, checked: {} };
let storageAvailable = true;

function loadState(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(typeof parsed.idx === "number") state.idx = parsed.idx;
      if(parsed.checked) state.checked = parsed.checked;
    }
  }catch(e){
    storageAvailable = false; /* e.g. private browsing with storage disabled */
  }
  render();
}

let saveTimer=null;
function saveState(){
  if(!storageAvailable) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ storageAvailable = false; }
  }, 200);
}

function exKey(scope, exIdx){ return scope+"::"+exIdx; }

/* ============================= RENDER ============================= */
const app = document.getElementById("app");

function currentEntry(){ return TIMELINE[state.idx]; }

function goTo(idx){
  state.idx = Math.max(0, Math.min(TIMELINE.length-1, idx));
  saveState();
  render();
  window.scrollTo(0,0);
}

function findIndex(pred){
  for(let i=0;i<TIMELINE.length;i++){ if(pred(TIMELINE[i])) return i; }
  return state.idx;
}

function renderExerciseList(exList, scopeKey, phaseId, week){
  return exList.map((ex, i)=>{
    const k = exKey(scopeKey, i);
    const isDone = !!state.checked[k];
    let trackHtml = "";
    if(ex.t && phaseId && week){
      const val = progFor(phaseId, ex.t, week);
      const label = (val==="test") ? "GATE TEST WEEK" : (val==="final test") ? "FINAL TEST" : (val==="deload"||val==="skip") ? val.toUpperCase() : val;
      trackHtml = '<div class="ex-track"><span class="k">Wk '+week+' target →</span> '+label+'</div>';
    }
    return '<div class="ex-card '+(isDone?"done":"")+'" data-k="'+k+'">'
      + '<div class="ex-top">'
      +   '<div class="checkbox">✓</div>'
      +   '<div class="ex-name"><span class="ex-order">'+String(i+1).padStart(2,"0")+'</span>'+ex.n+'</div>'
      + '</div>'
      + '<div class="ex-meta">'
      +   '<div><span class="lbl">Sets x Reps</span>'+ex.d+'</div>'
      +   '<div><span class="lbl">Rest</span>'+ex.r+'</div>'
      + '</div>'
      + (ex.note? '<div class="ex-note">'+ex.note+'</div>' : "")
      + trackHtml
      + '</div>';
  }).join("");
}

function render(){
  const e = currentEntry();
  let phase=null, week=null, dayKey=null, dayObj=null, scopeLabel="", locLabel="", monthsLabel="";

  if(e.kind==="week0"){
    phase = WEEK0; dayKey = e.dayKey; dayObj = WEEK0.days[dayKey];
    scopeLabel = "week0"; locLabel = WEEK0.loc; monthsLabel = WEEK0.months;
  } else if(e.kind==="maint"){
    phase = MAINTENANCE; dayKey = e.dayKey; dayObj = MAINTENANCE.days[dayKey];
    scopeLabel = "maint"; locLabel = MAINTENANCE.loc; monthsLabel = MAINTENANCE.months;
  } else if(e.kind==="day"){
    phase = PHASES.find(p=>p.id===e.phaseId); week = e.week; dayKey = e.dayKey; dayObj = phase.days[dayKey];
    scopeLabel = "p"+phase.id+"w"+week+"d"+dayKey; locLabel = phase.loc; monthsLabel = phase.months;
  } else if(e.kind==="gate"){
    phase = PHASES.find(p=>p.id===e.phaseId); week = e.week;
    scopeLabel = "p"+phase.id+"w"+week+"gate"; locLabel = phase.loc; monthsLabel = phase.months;
  }

  const isDeload = e.kind==="day" && (week===4 || week===8 || week===12);

  /* ---- Phase strip ---- */
  const chips = ['<div class="phase-chip '+(e.kind==="week0"?"active":"")+'" data-jump="week0"><span class="n">W0</span>Baseline</div>']
    .concat(PHASES.map(p=>'<div class="phase-chip '+((e.phaseId===p.id)?"active":"")+'" data-jump="p'+p.id+'"><span class="n">P'+p.id+'</span>'+p.name+'</div>'))
    .concat(['<div class="phase-chip '+(e.kind==="maint"?"active":"")+'" data-jump="maint"><span class="n">＋</span>Maintain</div>'])
    .join("");

  let html = '<header class="top"><div class="brand"><div><h1 class="display">THE BUILD</h1><div class="sub">24-Month Calisthenics Log</div></div><button class="info-btn" id="infoBtn">i</button></div></header>';
  html += '<div class="phase-strip">'+chips+'</div>';

  if(e.kind==="week0" || e.kind==="maint"){
    html += '<div class="phase-banner"><div class="name display">'+phase.name+'</div><div class="meta">'+monthsLabel+' · '+locLabel+'</div><div class="mission">'+phase.mission+'</div></div>';
    if(e.kind==="week0"){
      html += '<main><div class="placement-box"><b style="color:#fff">Placement:</b> '+phase.placement+'</div>';
    } else {
      html += '<main><div class="placement-box">'+phase.note+'</div>';
    }
    const order = phase.dayOrder;
    html += '<div class="day-tabs">'+order.map(dk=>'<div class="day-tab '+(dk===dayKey?"active":"")+'" data-day="'+dk+'">'+phase.days[dk].label.split(" — ")[0].split(" ").slice(-2).join(" ")+'</div>').join("")+'</div>';
    html += '<div class="day-header"><h2>'+dayObj.label+'</h2><button class="reset-btn" id="resetBtn">Reset</button></div>';
    html += '<div class="test-list">'+renderExerciseList(dayObj.ex, scopeLabel, null, null)+'</div></main>';
  } else if(e.kind==="day"){
    html += '<div class="phase-banner"><div class="name display">'+phase.name+'</div><div class="meta">Week '+week+' of 12 · '+monthsLabel+' · '+locLabel+'</div></div>';
    html += renderGateTrack(phase, week);
    html += renderDayTabs(phase, week, dayKey, false);
    html += '<main>';
    if(isDeload){
      if(week===12){
        html += '<div class="banner alert"><b>Deload + Gate Test week.</b> Cut working sets roughly in half, keep every rep crisp. The exit test happens this week — see the Gate Test tab.</div>';
      } else {
        html += '<div class="banner"><b>Deload week.</b> Cut working sets roughly in half, same movements, everything sharp. Optional Saturday is off this week. Tendons and joints adapt slower than muscle — this is what lets volume keep climbing without breaking you.</div>';
      }
    }
    if(week===8){
      html += '<div class="banner"><b>Early-test option:</b> if you are cruising, take the Phase '+phase.id+' exit test now (see Gate Test tab) and bank the remaining weeks.</div>';
    }
    html += '<div class="day-header"><h2>'+dayObj.label+(dayObj.optional?' <span style="font-size:13px;color:var(--muted)">· optional</span>':'')+'</h2><button class="reset-btn" id="resetBtn">Reset</button></div>';
    html += renderExerciseList(dayObj.ex, scopeLabel, phase.id, week);
    html += '</main>';
  } else if(e.kind==="gate"){
    html += '<div class="phase-banner"><div class="name display">'+phase.name+'</div><div class="meta">Week '+week+' of 12 · '+monthsLabel+' · '+locLabel+'</div></div>';
    html += renderGateTrack(phase, week);
    html += renderDayTabs(phase, week, null, true);
    html += '<main><div class="day-header"><h2>'+phase.exitLabel+'</h2></div>';
    html += '<ul class="test-list">'+phase.exit.map(([t,m])=>'<li class="test-row"><span class="t">'+t+'</span><span class="m">'+m+'</span></li>').join("")+'</ul>';
    html += '<div class="gate-rule">'+phase.gateNote+'</div></main>';
  }

  html += renderFooter(e);
  app.innerHTML = html;
  bindEvents();
}

function renderGateTrack(phase, activeWeek){
  let nodes = "";
  for(let w=1; w<=12; w++){
    const isGate = (w===12);
    const isDeload = (w===4 || w===8);
    const cls = ["gate-node"];
    if(isDeload) cls.push("deload");
    if(isGate) cls.push("gate");
    if(w===activeWeek) cls.push("active");
    nodes += '<div class="'+cls.join(" ")+'" data-week="'+w+'" data-phase="'+phase.id+'">'+(isGate?"GATE":w)+'</div>';
  }
  return '<div class="gate-wrap"><div class="gate-track"><div class="gate-rail"></div>'+nodes+'</div></div>';
}

function renderDayTabs(phase, week, activeDayKey, gateActive){
  const days = ["Mon","Tue","Wed","Thu","Fri","Sat"];
  let html = '<div class="day-tabs">';
  days.forEach(dk=>{
    const d = phase.days[dk];
    html += '<div class="day-tab '+(dk===activeDayKey?"active":"")+'" data-jumpday="'+dk+'">'+dk+(d.optional?'<span class="opt">optional</span>':'')+'</div>';
  });
  if(week===8 || week===12){
    html += '<div class="day-tab testtab '+(gateActive?"active":"")+'" data-jumpgate="1">GATE<span class="opt">test</span></div>';
  }
  html += '</div>';
  return html;
}

function renderFooter(e){
  const idx = state.idx;
  let posLabel = "";
  if(e.kind==="week0") posLabel = "WK 0";
  else if(e.kind==="maint") posLabel = "DONE";
  else if(e.kind==="day") posLabel = "WK "+e.week;
  else if(e.kind==="gate") posLabel = "GATE";
  return '<footer class="nav">'
    + '<button id="prevBtn">‹ Prev</button>'
    + '<div class="pos">'+posLabel+'<br>'+(idx+1)+' / '+TIMELINE.length+'</div>'
    + '<button id="nextBtn" class="primary">Next ›</button>'
    + '</footer>';
}

function bindEvents(){
  document.querySelectorAll(".ex-card").forEach(card=>{
    card.addEventListener("click", ()=>{
      const k = card.getAttribute("data-k");
      state.checked[k] = !state.checked[k];
      saveState();
      card.classList.toggle("done");
    });
  });
  const resetBtn = document.getElementById("resetBtn");
  if(resetBtn){
    resetBtn.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      document.querySelectorAll(".ex-card").forEach(card=>{
        const k = card.getAttribute("data-k");
        delete state.checked[k];
        card.classList.remove("done");
      });
      saveState();
    });
  }
  document.querySelectorAll(".phase-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const j = chip.getAttribute("data-jump");
      if(j==="week0"){ goTo(0); return; }
      if(j==="maint"){ goTo(findIndex(t=>t.kind==="maint")); return; }
      const pid = parseInt(j.replace("p",""),10);
      goTo(findIndex(t=>t.kind==="day" && t.phaseId===pid));
    });
  });
  document.querySelectorAll(".gate-node").forEach(node=>{
    node.addEventListener("click", ()=>{
      const w = parseInt(node.getAttribute("data-week"),10);
      const pid = parseInt(node.getAttribute("data-phase"),10);
      const cur = currentEntry();
      const dk = (cur.kind==="day") ? cur.dayKey : "Mon";
      goTo(findIndex(t=>t.kind==="day" && t.phaseId===pid && t.week===w && t.dayKey===dk));
    });
  });
  document.querySelectorAll("[data-day]").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      const dk = tab.getAttribute("data-day");
      const cur = currentEntry();
      goTo(findIndex(t=>t.kind===cur.kind && t.dayKey===dk));
    });
  });
  document.querySelectorAll("[data-jumpday]").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      const dk = tab.getAttribute("data-jumpday");
      const cur = currentEntry();
      goTo(findIndex(t=>t.kind==="day" && t.phaseId===cur.phaseId && t.week===cur.week && t.dayKey===dk));
    });
  });
  document.querySelectorAll("[data-jumpgate]").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      const cur = currentEntry();
      goTo(findIndex(t=>t.kind==="gate" && t.phaseId===cur.phaseId && t.week===cur.week));
    });
  });
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if(prevBtn) prevBtn.addEventListener("click", ()=>goTo(state.idx-1));
  if(nextBtn) nextBtn.addEventListener("click", ()=>goTo(state.idx+1));
  const infoBtn = document.getElementById("infoBtn");
  if(infoBtn) infoBtn.addEventListener("click", openReference);
}

function openReference(){
  const lib = REFERENCE.library.map(([n,cue,neigh])=>'<tr><td class="k">'+n+'</td><td>'+cue+'<br><span style="color:var(--muted2)">'+neigh+'</span></td></tr>').join("");
  const modalHtml = '<div class="modal-backdrop" id="backdrop"><div class="modal">'
    + '<button class="close" id="closeModal">Close</button>'
    + '<h3>Warm-Up (every session, ~8 min)</h3><p>'+REFERENCE.warmup+'</p>'
    + '<h3>Two-in-Reserve Rule</h3><p>'+REFERENCE.reserve+'</p>'
    + '<h3>Too Hard / Too Easy</h3><p>'+REFERENCE.tooHardEasy+'</p>'
    + '<h3>Session Order</h3><p>'+REFERENCE.order+'</p>'
    + '<h3>Rest Periods</h3><p>'+REFERENCE.rest+'</p>'
    + '<h3>Deloads &amp; Early Testing</h3><p>'+REFERENCE.deload+'</p>'
    + '<h3>Missed Sessions</h3><p>'+REFERENCE.missed+'</p>'
    + '<h3>Pain Rules</h3><p>'+REFERENCE.pain+'</p>'
    + '<h3>Eating for the Eight-Pack</h3><p>'+REFERENCE.nutrition+'</p>'
    + '<h3>Exercise Library</h3><table>'+lib+'</table>'
    + '<h3>About Your Data</h3><p>Checkboxes and your current position save to this browser only (localStorage), on this device. Clearing your browser data/cache will erase progress, and it won\u2019t carry over to a different browser or phone. Nothing is sent anywhere.</p>'
    + '</div></div>';
  const div = document.createElement("div");
  div.innerHTML = modalHtml;
  document.body.appendChild(div);
  document.getElementById("backdrop").addEventListener("click",(ev)=>{ if(ev.target.id==="backdrop") div.remove(); });
  document.getElementById("closeModal").addEventListener("click", ()=>div.remove());
}

loadState();
</script>
